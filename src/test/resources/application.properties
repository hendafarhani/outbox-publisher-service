spring.cloud.config.enabled=false
spring.config.import=optional:configserver:

kafka.enabled=false
kafka.bootstrap-servers=localhost:9092
outbox.publisher.event-topic=ride.request.events
outbox.publisher.ack-topic=ride.request.events.acks
outbox.publisher.ack-listener-id=outboxAckListener
outbox.publisher.ack-group-id=outbox-publisher-service.group
spring.datasource.url=jdbc:h2:mem:outboxpublisherdb;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
